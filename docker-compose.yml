services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cic}
      POSTGRES_DB: ${POSTGRES_DB:-cic}
    volumes:
      - /srv/perso/cic/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cic}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "${APP_PORT:-3847}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cic}:${POSTGRES_PASSWORD:-cic}@postgres:5432/${POSTGRES_DB:-cic}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:${APP_PORT:-3847}}
    depends_on:
      postgres:
        condition: service_healthy
